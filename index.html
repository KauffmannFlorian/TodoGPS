<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Todo GPS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F5F7;color:#1D1D1F;min-height:100vh}
#app{max-width:680px;margin:0 auto;padding:1.5rem 1rem}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.app-title{font-size:20px;font-weight:600}
.save-badge{font-size:11px;color:#86868B}
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;background:#E8E8ED;border-radius:10px;padding:4px}
.tab{flex:1;padding:8px;border:none;background:none;border-radius:7px;font-size:13px;cursor:pointer;color:#86868B;font-family:inherit;transition:all .15s}
.tab.active{background:#fff;color:#1D1D1F;box-shadow:0 1px 3px rgba(0,0,0,.1);font-weight:500}
.section{display:none}.section.visible{display:block}
.gps-bar{border-radius:12px;border:1px solid #E5E5EA;padding:12px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:10px;background:#F9F9FB}
.gps-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:#C7C7CC;transition:background .3s}
.gps-dot.active{background:#30D158;box-shadow:0 0 0 3px rgba(48,209,88,.2)}
.gps-dot.error{background:#FF453A}
.gps-dot.loading{background:#FF9F0A;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.gps-label{font-size:13px;color:#1D1D1F;flex:1}
.gps-sub{font-size:11px;color:#86868B;margin-top:2px}
.btn-gps{border:1px solid #C7C7CC;border-radius:8px;padding:7px 13px;font-size:13px;background:#fff;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.btn-gps:hover{background:#F2F2F7}
.btn-gps.active{background:#E8F9EE;border-color:#30D158;color:#1A7A35}
.nbadge{font-size:11px;padding:3px 9px;border-radius:999px;background:#30D158;color:#fff;font-weight:600}
.nearby-alert{border-radius:10px;padding:10px 14px;margin-bottom:1rem;font-size:13px;display:flex;align-items:flex-start;gap:8px;border:1px solid #30D158;background:#E8F9EE;color:#1A5C2E}
.focus-header{display:flex;align-items:baseline;justify-content:space-between;margin:1rem 0 10px}
.focus-title{font-size:14px;font-weight:500}
.focus-sub{font-size:12px;color:#86868B}
.focus-slots{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
.focus-slot{border:1.5px dashed #C7C7CC;border-radius:12px;padding:14px 16px;cursor:pointer;min-height:58px;display:flex;align-items:center;gap:10px;transition:all .15s;background:#fff}
.focus-slot:hover{border-color:#007AFF}
.focus-slot.filled{border-style:solid;border-color:#E5E5EA;cursor:default}
.focus-slot.nearby{border-color:#30D158;background:#E8F9EE}
.focus-slot.done-s{opacity:.5}
.snum{font-size:22px;font-weight:500;color:#C7C7CC;width:24px;flex-shrink:0;text-align:center}
.stext{font-size:15px;flex:1;min-width:0}
.stext.done{text-decoration:line-through;color:#86868B}
.shint{font-size:13px;color:#86868B}
.mcheck{width:22px;height:22px;border-radius:50%;border:1.5px solid #C7C7CC;cursor:pointer;flex-shrink:0;background:#fff;transition:all .15s;display:flex;align-items:center;justify-content:center}
.mcheck:hover{border-color:#30D158}
.mcheck.done{background:#30D158;border-color:#30D158}
.mcheck.done::after{content:'';display:block;width:10px;height:6px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(1px,-1px)}
.divider{height:1px;background:#E5E5EA;margin:1.25rem 0}
.sec-label{font-size:11px;font-weight:600;color:#86868B;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.add-box{background:#F9F9FB;border-radius:12px;border:1px solid #E5E5EA;padding:12px 14px;margin-bottom:12px}
.add-row{display:flex;gap:6px;margin-bottom:6px}
.add-row input{flex:1;border:1px solid #E5E5EA;border-radius:8px;padding:9px 12px;font-size:14px;background:#fff;font-family:inherit;outline:none;transition:border-color .15s}
.add-row input:focus{border-color:#007AFF}
.add-row3{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.add-row3 select{border:1px solid #E5E5EA;border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;font-family:inherit;outline:none}
.btn-map{border:1px solid #E5E5EA;border-radius:8px;padding:9px 12px;font-size:13px;color:#86868B;background:#fff;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;width:100%;text-align:left}
.btn-map:hover{background:#F2F2F7}
.btn-map.selected{background:#E8F9EE;border-color:#30D158;color:#1A5C2E}
.btn-add{border:1px solid #007AFF;border-radius:8px;padding:8px 16px;font-size:14px;color:#007AFF;background:#E8F0FF;cursor:pointer;font-weight:500;font-family:inherit;margin-left:auto}
.btn-add:hover{background:#CCE0FF}

/* Modal */
.map-modal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:flex;align-items:flex-end;justify-content:center}
.map-modal.hidden{display:none}
.map-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:680px;overflow:hidden;display:flex;flex-direction:column;max-height:92vh}
.map-header{padding:14px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.map-title{font-size:15px;font-weight:600}
.map-hint{font-size:12px;color:#86868B;margin-top:2px}
.btn-close-map{background:#F2F2F7;border:none;border-radius:50%;width:30px;height:30px;font-size:14px;cursor:pointer;color:#86868B;flex-shrink:0}

/* Recherche lieu */
.search-row{padding:0 16px 10px;display:flex;gap:8px;flex-shrink:0}
.search-inp{flex:1;border:1px solid #E5E5EA;border-radius:10px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;background:#F9F9FB}
.search-inp:focus{border-color:#007AFF;background:#fff}
.btn-search{border:1px solid #007AFF;border-radius:10px;padding:10px 14px;font-size:13px;color:#007AFF;background:#E8F0FF;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-search:hover{background:#CCE0FF}

/* Résultats recherche */
.search-results{flex-shrink:0;max-height:180px;overflow-y:auto;border-top:1px solid #E5E5EA}
.search-result{padding:12px 16px;border-bottom:1px solid #F2F2F7;cursor:pointer;transition:background .1s}
.search-result:hover{background:#F5F5F7}
.search-result:last-child{border-bottom:none}
.sr-name{font-size:14px;font-weight:500;color:#1D1D1F}
.sr-addr{font-size:12px;color:#86868B;margin-top:2px}
.search-loading{padding:16px;text-align:center;font-size:13px;color:#86868B}
.search-empty{padding:16px;text-align:center;font-size:13px;color:#86868B}

/* Preview sélection */
.loc-confirm{padding:12px 16px;background:#E8F9EE;border-top:1px solid #30D158;display:flex;align-items:center;gap:10px;flex-shrink:0}
.loc-confirm.hidden{display:none}
.loc-confirm-name{font-size:13px;color:#1A5C2E;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-confirm-map{border:1px solid #30D158;border-radius:8px;padding:8px 16px;font-size:13px;color:#1A5C2E;background:#fff;cursor:pointer;font-weight:500;font-family:inherit;white-space:nowrap;flex-shrink:0}
.btn-confirm-map:hover{background:#E8F9EE}

/* Pills */
.cpill{font-size:11px;padding:3px 9px;border-radius:999px;flex-shrink:0;font-weight:500}
.cat-perso{background:#EDEDF8;color:#4A3F8C}
.cat-travail{background:#FEF3E2;color:#7A4D0A}
.cat-courses{background:#E8F5D8;color:#2C5F0A}
.cat-sante{background:#FDEAEA;color:#8B1F1F}
.cat-autre{background:#F2F2F7;color:#86868B}
.mpill{font-size:11px;padding:3px 8px;border-radius:999px;background:#F2F2F7;color:#86868B;flex-shrink:0}
.fpill{font-size:11px;padding:3px 8px;border-radius:999px;background:#E8F9EE;color:#1A5C2E;border:1px solid #30D158;flex-shrink:0}
.dpill{font-size:11px;padding:3px 8px;border-radius:999px;background:#E8F9EE;color:#1A5C2E;font-weight:500;flex-shrink:0}
.lpill{font-size:11px;padding:3px 7px;border-radius:999px;background:#F2F2F7;color:#86868B;flex-shrink:0}
.bl-list{display:flex;flex-direction:column;gap:6px}
.bl-item{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E5E5EA;border-radius:10px;padding:10px 12px;transition:all .2s}
.bl-item.nearby{border-color:#30D158;background:#E8F9EE}
.bl-text{font-size:14px;flex:1;min-width:0}
.bl-text.done{text-decoration:line-through;color:#86868B}
.bl-sub{font-size:11px;color:#86868B;margin-top:2px}
.btn-focus{font-size:11px;padding:4px 10px;border-radius:999px;background:#E8F0FF;border:1px solid #007AFF;color:#007AFF;cursor:pointer;white-space:nowrap;font-family:inherit}
.btn-focus:disabled{opacity:.4;cursor:default;background:#F2F2F7;border-color:#C7C7CC;color:#86868B}
.btn-del{background:none;border:none;cursor:pointer;color:#86868B;font-size:18px;padding:2px 4px;opacity:.5;line-height:1}
.btn-del:hover{opacity:1}
.count-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cnt-pill{font-size:11px;padding:3px 9px;border-radius:999px;background:#F2F2F7;color:#86868B;border:1px solid #E5E5EA}
.cnt-warn{background:#FEF3E2;color:#7A4D0A;border-color:#FAD67A}
.cnt-full{background:#FDEAEA;color:#8B1F1F;border-color:#F5C0C0}
.limit-msg{font-size:13px;color:#8B1F1F;background:#FDEAEA;border:1px solid #F5C0C0;border-radius:8px;padding:9px 13px;margin-bottom:10px}
.moment-block{background:#fff;border:1px solid #E5E5EA;border-radius:12px;overflow:hidden;margin-bottom:10px}
.moment-head{padding:11px 14px;border-bottom:1px solid #E5E5EA;display:flex;align-items:center;gap:8px}
.mico{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.mname{font-size:14px;font-weight:500}
.mcnt{font-size:12px;color:#86868B;margin-left:auto}
.moment-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #F2F2F7}
.moment-item:last-child{border-bottom:none}
.moment-item.nearby{background:#E8F9EE}
.mi-text{font-size:14px;flex:1;min-width:0}
.mi-text.done{text-decoration:line-through;color:#86868B}
.empty-m{padding:14px;font-size:13px;color:#86868B}
</style>
</head>
<body>

<!-- Modal lieu -->
<div class="map-modal hidden" id="map-modal">
  <div class="map-sheet">
    <div class="map-header">
      <div><div class="map-title">Choisir un lieu</div><div class="map-hint">Recherche un endroit ou utilise ta position</div></div>
      <button class="btn-close-map" onclick="closeMap()">✕</button>
    </div>
    <div class="search-row">
      <input class="search-inp" id="search-inp" placeholder="Chercher un lieu (ex: Al Yalayis 2...)" onkeydown="if(event.key==='Enter')searchPlace()"/>
      <button class="btn-search" onclick="searchPlace()">Chercher</button>
    </div>
    <div id="search-results" class="search-results" style="display:none"></div>

    <!-- Bouton position actuelle -->
    <div style="padding:0 16px 12px;display:flex;gap:8px;flex-shrink:0;border-bottom:1px solid #E5E5EA">
      <button onclick="useCurrentPos()" style="flex:1;border:1px solid #E5E5EA;border-radius:10px;padding:10px;font-size:13px;background:#fff;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;color:#1D1D1F">
        📍 Utiliser ma position actuelle
      </button>
    </div>

    <!-- Confirmation lieu sélectionné -->
    <div class="loc-confirm hidden" id="loc-confirm">
      <span style="font-size:18px">✅</span>
      <span class="loc-confirm-name" id="loc-confirm-name"></span>
      <button class="btn-confirm-map" onclick="confirmMap()">Confirmer</button>
    </div>

    <!-- Info si rien sélectionné -->
    <div id="loc-empty" style="padding:24px 16px;text-align:center;flex:1">
      <div style="font-size:36px;margin-bottom:10px">🗺️</div>
      <div style="font-size:14px;font-weight:500;color:#1D1D1F;margin-bottom:6px">Recherche un lieu</div>
      <div style="font-size:13px;color:#86868B">Tape le nom d'un endroit ou utilise<br>ta position GPS actuelle</div>
    </div>
  </div>
</div>

<div id="app">
  <div class="top-row">
    <span class="app-title">Mes tâches</span>
    <span class="save-badge" id="save-txt">Chargement...</span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('focus')">Focus</button>
    <button class="tab" onclick="showTab('backlog')">Toutes</button>
    <button class="tab" onclick="showTab('moments')">Par moment</button>
  </div>
  <div id="tab-focus" class="section visible"></div>
  <div id="tab-backlog" class="section"></div>
  <div id="tab-moments" class="section"></div>
</div>

<script>
const MAX=10, RADIUS=500;
const MOMENTS=['matin','apresmidi','soir'];
const ML={matin:'Matin',apresmidi:'Après-midi',soir:'Soir'};
const MI={matin:{bg:'#FEF3E2',icon:'🌅'},apresmidi:{bg:'#E8F0FF',icon:'☀️'},soir:{bg:'#EDEDF8',icon:'🌙'}};

let tasks=[], nextId=1, currentTab='focus', saveTimer=null;
let gpsActive=false, gpsWatcher=null, userPos=null, currentPlaceName=null;
let notifiedIds=new Set();
let newTaskCoords=null, newTaskLocName=null;
let pickedCoords=null, pickedName=null;
let searchTimer=null;

// ─── Storage ─────────────────────────────────────────────────
function loadData(){
  try{
    const raw=localStorage.getItem('todo_gps_v4');
    if(raw){const d=JSON.parse(raw);tasks=d.tasks||[];nextId=d.nextId||tasks.length+1;}
    else{
      tasks=[
        {id:1,text:"Faire la demande de Move-in permit",cat:"perso",moment:"matin",locName:"",coords:null,nearby:false,dist:null,inFocus:true,done:false},
        {id:2,text:"Acheter médicaments",cat:"sante",moment:"apresmidi",locName:"",coords:null,nearby:false,dist:null,inFocus:true,done:false},
        {id:3,text:"Faire les courses",cat:"courses",moment:"soir",locName:"",coords:null,nearby:false,dist:null,inFocus:false,done:false},
        {id:4,text:"Appeler assurance",cat:"perso",moment:"matin",locName:"",coords:null,nearby:false,dist:null,inFocus:false,done:false},
      ];
      nextId=5;
    }
  }catch(e){tasks=[];nextId=1;}
  setSave('Sauvegardé'); render();
}
function saveData(){
  setSave('Sauvegarde...');
  try{localStorage.setItem('todo_gps_v4',JSON.stringify({tasks,nextId}));setSave('✓ Sauvegardé');}
  catch(e){setSave('Erreur');}
}
function scheduleSave(){if(saveTimer)clearTimeout(saveTimer);setSave('...');saveTimer=setTimeout(saveData,600);}
function setSave(t){const el=document.getElementById('save-txt');if(el)el.textContent=t;}

// ─── Recherche lieu ──────────────────────────────────────────
async function searchPlace(){
  const q=document.getElementById('search-inp').value.trim();
  if(!q) return;
  const el=document.getElementById('search-results');
  el.style.display='block';
  el.innerHTML=`<div class="search-loading">🔍 Recherche en cours...</div>`;
  document.getElementById('loc-empty').style.display='none';

  try{
    // Photon API (OpenStreetMap) — CORS friendly
    const url=`https://photon.komoot.io/api/?q=${encodeURIComponent(q+' Dubai')}&limit=5&lang=fr`;
    const res=await fetch(url);
    const data=await res.json();
    const features=data.features||[];
    if(!features.length){
      el.innerHTML=`<div class="search-empty">Aucun résultat — essaie un autre nom</div>`;
      return;
    }
    el.innerHTML=features.map((f,i)=>{
      const name=f.properties.name||f.properties.street||'Lieu';
      const city=f.properties.city||f.properties.state||'';
      const country=f.properties.country||'';
      const addr=[city,country].filter(Boolean).join(', ');
      const lat=f.geometry.coordinates[1], lon=f.geometry.coordinates[0];
      return`<div class="search-result" onclick="selectPlace(${lat},${lon},'${(name+', '+addr).replace(/'/g,"\\'")}')">
        <div class="sr-name">${name}</div>
        ${addr?`<div class="sr-addr">${addr}</div>`:''}
      </div>`;
    }).join('');
  }catch(e){
    el.innerHTML=`<div class="search-empty">Erreur réseau — vérifie ta connexion</div>`;
  }
}

function selectPlace(lat,lon,name){
  pickedCoords={lat,lon};
  pickedName=name;
  document.getElementById('search-results').style.display='none';
  document.getElementById('loc-empty').style.display='none';
  const conf=document.getElementById('loc-confirm');
  conf.classList.remove('hidden');
  document.getElementById('loc-confirm-name').textContent=`📍 ${name}`;
}

function useCurrentPos(){
  if(!userPos){
    // Demande la position si GPS pas encore actif
    navigator.geolocation.getCurrentPosition(pos=>{
      pickedCoords={lat:pos.coords.latitude,lon:pos.coords.longitude};
      pickedName=`Ma position (${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)})`;
      document.getElementById('loc-empty').style.display='none';
      document.getElementById('search-results').style.display='none';
      const conf=document.getElementById('loc-confirm');
      conf.classList.remove('hidden');
      document.getElementById('loc-confirm-name').textContent=`📍 ${pickedName}`;
    },()=>alert('Impossible de récupérer ta position.'),{enableHighAccuracy:true,timeout:8000});
  } else {
    pickedCoords={...userPos};
    pickedName=`Ma position (${userPos.lat.toFixed(4)}, ${userPos.lon.toFixed(4)})`;
    document.getElementById('loc-empty').style.display='none';
    document.getElementById('search-results').style.display='none';
    const conf=document.getElementById('loc-confirm');
    conf.classList.remove('hidden');
    document.getElementById('loc-confirm-name').textContent=`📍 ${pickedName}`;
  }
}

function openMap(){
  document.getElementById('map-modal').classList.remove('hidden');
  pickedCoords=null; pickedName=null;
  document.getElementById('search-inp').value='';
  document.getElementById('search-results').style.display='none';
  document.getElementById('loc-confirm').classList.add('hidden');
  document.getElementById('loc-empty').style.display='block';
  setTimeout(()=>document.getElementById('search-inp').focus(),100);
}
function closeMap(){document.getElementById('map-modal').classList.add('hidden');}
function confirmMap(){
  if(!pickedCoords) return;
  newTaskCoords=pickedCoords;
  newTaskLocName=pickedName;
  closeMap(); render();
}

// ─── GPS ─────────────────────────────────────────────────────
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(d){if(d===null||d===undefined)return'';return d<1000?`${d}m`:`${(d/1000).toFixed(1)}km`;}

async function startGPS(){
  if(!navigator.geolocation){alert('Géolocalisation non supportée.');return;}
  setGPSUI('loading','Localisation en cours...');
  if('Notification' in window&&Notification.permission==='default') await Notification.requestPermission();
  notifiedIds=new Set();
  gpsWatcher=navigator.geolocation.watchPosition(
    pos=>{
      userPos={lat:pos.coords.latitude,lon:pos.coords.longitude};
      currentPlaceName=`${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
      setGPSUI('active',`GPS actif · précision ${Math.round(pos.coords.accuracy)}m`);
      checkProximity();
    },
    err=>{
      const m={1:'Accès refusé.',2:'Position indisponible.',3:'Délai dépassé.'};
      setGPSUI('error',m[err.code]||'Erreur GPS');
      gpsActive=false; render();
    },
    {enableHighAccuracy:true,maximumAge:10000,timeout:15000}
  );
  gpsActive=true; render();
}
function stopGPS(){
  if(gpsWatcher!==null) navigator.geolocation.clearWatch(gpsWatcher);
  gpsWatcher=null; gpsActive=false; userPos=null; currentPlaceName=null;
  tasks.forEach(t=>{t.nearby=false;t.dist=null;});
  setGPSUI('off','GPS désactivé'); render();
}
function toggleGPS(){gpsActive?stopGPS():startGPS();}
function setGPSUI(s,msg){window._gpsState={state:s,msg};render();}

function checkProximity(){
  if(!userPos) return;
  let changed=false;
  tasks.filter(t=>t.coords&&!t.done).forEach(t=>{
    const d=Math.round(haversine(userPos.lat,userPos.lon,t.coords.lat,t.coords.lon));
    t.dist=d; const was=t.nearby; t.nearby=d<=RADIUS;
    if(t.nearby&&!was&&!notifiedIds.has(t.id)){
      notifiedIds.add(t.id);
      if('Notification' in window&&Notification.permission==='granted'){
        new Notification('📍 Tâche à proximité !',{
          body:`"${t.text}"${t.locName?' — '+t.locName:''} à ${fmtDist(d)} de toi.`
        });
      }
    }
    if(!t.nearby) notifiedIds.delete(t.id);
    changed=true;
  });
  tasks.filter(t=>!t.coords||t.done).forEach(t=>{t.nearby=false;t.dist=null;});
  if(changed){scheduleSave();render();}
}

async function simulateNearby(){
  const t=tasks.find(x=>x.coords&&!x.done);
  if(!t){alert('Ajoute d\'abord une tâche avec un lieu.');return;}
  userPos={lat:t.coords.lat+0.001,lon:t.coords.lon};
  gpsActive=true; window._gpsState={state:'active',msg:'🧪 Mode test'};
  currentPlaceName='Position simulée'; notifiedIds=new Set();
  checkProximity();
  if('Notification' in window){
    if(Notification.permission==='granted') new Notification('🧪 Test',{body:'Notifications OK ✅'});
    else{const p=await Notification.requestPermission();if(p==='granted') new Notification('🧪 Test',{body:'OK ✅'});}
  }
}

// ─── Task ops ────────────────────────────────────────────────
function catLabel(c){return{perso:'Perso',travail:'Travail',courses:'Courses',sante:'Santé',autre:'Autre'}[c]||c;}
function focusTasks(){return tasks.filter(t=>t.inFocus);}
function canFocus(){return focusTasks().length<3;}
function showTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['focus','backlog','moments'][i]===t));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));
  document.getElementById('tab-'+t).classList.add('visible'); render();
}
function toggleDone(id){
  const t=tasks.find(x=>x.id===id);
  if(t){t.done=!t.done;if(t.done){t.nearby=false;t.dist=null;}scheduleSave();render();}
}
function removeFromFocus(id){const t=tasks.find(x=>x.id===id);if(t){t.inFocus=false;scheduleSave();render();}}
function addToFocus(id){if(!canFocus())return;const t=tasks.find(x=>x.id===id);if(t){t.inFocus=true;scheduleSave();render();}}
function delTask(id){tasks=tasks.filter(x=>x.id!==id);scheduleSave();render();}
function addTask(){
  if(tasks.length>=MAX) return;
  const inp=document.getElementById('new-task-inp');
  const txt=inp.value.trim(); if(!txt) return;
  tasks.push({id:nextId++,text:txt,
    cat:document.getElementById('new-cat-sel').value,
    moment:document.getElementById('new-moment-sel').value,
    locName:newTaskLocName||'', coords:newTaskCoords||null,
    nearby:false,dist:null,inFocus:false,done:false});
  inp.value=''; newTaskCoords=null; newTaskLocName=null;
  scheduleSave(); render();
  if(userPos) checkProximity();
}

// ─── Render ──────────────────────────────────────────────────
function gpsBarHTML(){
  const s=window._gpsState||{state:'off',msg:'GPS désactivé'};
  const nb=tasks.filter(t=>t.nearby&&!t.done).length;
  const dot=s.state==='active'?' active':s.state==='error'?' error':s.state==='loading'?' loading':'';
  const sub=userPos?`📍 ${currentPlaceName} · rayon ${RADIUS}m`:'Active le GPS pour détecter les tâches proches';
  return`<div class="gps-bar">
    <div class="gps-dot${dot}"></div>
    <div style="flex:1"><div class="gps-label">${s.msg}</div><div class="gps-sub">${sub}</div></div>
    ${nb>0?`<span class="nbadge">📍 ${nb}</span>`:''}
    <button class="btn-gps" onclick="simulateNearby()" style="background:#FEF3E2;border-color:#FAD67A;color:#7A4D0A;margin-right:4px" title="Tester">🧪</button>
    <button class="btn-gps${gpsActive?' active':''}" onclick="toggleGPS()">${gpsActive?'Arrêter':'GPS'}</button>
  </div>`;
}
function nearbyHTML(){
  const nb=tasks.filter(t=>t.nearby&&!t.done);
  if(!nb.length||!gpsActive) return'';
  return`<div class="nearby-alert"><span style="font-size:18px;flex-shrink:0">📍</span>
    <div><strong>${nb.length} tâche${nb.length>1?'s':''} à moins de ${RADIUS}m :</strong><br>
    ${nb.map(t=>`${t.text}${t.locName?` — <em>${t.locName}</em>`:''} <span class="dpill">${fmtDist(t.dist)}</span>`).join('<br>')}</div></div>`;
}
function taskSub(t){
  if(!t.coords) return'';
  const name=t.locName||'Lieu épinglé';
  let s=`<div class="bl-sub">📍 ${name}`;
  if(t.dist!==null&&gpsActive) s+=` · <span style="color:${t.nearby?'#1A5C2E':'#86868B'};font-weight:${t.nearby?600:400}">${fmtDist(t.dist)}</span>`;
  return s+'</div>';
}
function renderFocus(){
  const ft=focusTasks(), done=ft.filter(t=>t.done).length;
  let h=gpsBarHTML()+nearbyHTML();
  h+=`<div class="focus-header"><span class="focus-title">Mes 3 priorités du jour</span><span class="focus-sub">${done}/${ft.length} faites</span></div><div class="focus-slots">`;
  for(let i=0;i<3;i++){
    const t=ft[i];
    if(t){
      h+=`<div class="focus-slot filled${t.nearby&&!t.done?' nearby':''}${t.done?' done-s':''}">
        <div class="mcheck${t.done?' done':''}" onclick="toggleDone(${t.id})"></div>
        <div style="flex:1;min-width:0"><div class="stext${t.done?' done':''}">${t.text}</div>${taskSub(t)}</div>
        <span class="cpill cat-${t.cat}">${catLabel(t.cat)}</span>
        <span class="mpill">${ML[t.moment]}</span>
        ${t.nearby&&!t.done?`<span class="dpill">${fmtDist(t.dist)}</span>`:''}
        <button class="btn-del" onclick="removeFromFocus(${t.id})">×</button>
      </div>`;
    }else{
      h+=`<div class="focus-slot" onclick="showTab('backlog')"><span class="snum">${i+1}</span><span class="shint">Ajouter une priorité →</span></div>`;
    }
  }
  h+='</div>';
  const pending=tasks.filter(t=>!t.done&&!t.inFocus);
  if(pending.length){
    h+=`<div class="divider"></div><div class="sec-label">En attente (${pending.length})</div><div class="bl-list">`;
    [...pending].sort((a,b)=>b.nearby-a.nearby).slice(0,3).forEach(t=>{
      h+=`<div class="bl-item${t.nearby?' nearby':''}">
        <span class="bl-text">${t.text}</span>
        ${t.locName?`<span class="lpill">📍 ${t.locName}${t.dist!==null&&gpsActive?' · '+fmtDist(t.dist):''}</span>`:''}
        ${t.nearby?`<span class="dpill">Proche</span>`:''}
        <button class="btn-focus" onclick="addToFocus(${t.id})" ${!canFocus()?'disabled':''}>+ Focus</button>
      </div>`;
    });
    if(pending.length>3) h+=`<div style="font-size:12px;color:#86868B;padding:6px 2px">+${pending.length-3} autres dans Toutes</div>`;
    h+='</div>';
  }
  document.getElementById('tab-focus').innerHTML=h;
}
function renderBacklog(){
  const full=tasks.length>=MAX, warn=tasks.length>=MAX-2&&!full;
  const pc=full?'cnt-pill cnt-full':warn?'cnt-pill cnt-warn':'cnt-pill';
  let h=`<div class="count-row"><span class="sec-label">Toutes les tâches</span><span class="${pc}">${tasks.length}/${MAX}</span></div>`;
  if(full) h+=`<div class="limit-msg">⚠️ Limite atteinte — supprime une tâche pour en ajouter.</div>`;
  else{
    const locLabel=newTaskLocName?`📍 ${newTaskLocName}`:'📍 Ajouter un lieu (optionnel)';
    h+=`<div class="add-box">
      <div class="add-row"><input type="text" id="new-task-inp" placeholder="Nouvelle tâche..." onkeydown="if(event.key==='Enter')addTask()"/></div>
      <div class="add-row"><button class="btn-map${newTaskLocName?' selected':''}" onclick="openMap()">${locLabel}</button></div>
      <div class="add-row3">
        <select id="new-cat-sel"><option value="autre">Autre</option><option value="courses">Courses</option><option value="travail">Travail</option><option value="sante">Santé</option><option value="perso">Perso</option></select>
        <select id="new-moment-sel"><option value="matin">Matin</option><option value="apresmidi">Après-midi</option><option value="soir">Soir</option></select>
        <button class="btn-add" onclick="addTask()">Ajouter</button>
      </div>
    </div>`;
  }
  if(!tasks.length){h+=`<div style="text-align:center;padding:2.5rem;font-size:14px;color:#86868B">Aucune tâche</div>`;document.getElementById('tab-backlog').innerHTML=h;return;}
  h+=`<div class="bl-list">`;
  [...tasks].sort((a,b)=>{if(a.done!==b.done)return a.done-b.done;return b.nearby-a.nearby;}).forEach(t=>{
    h+=`<div class="bl-item${t.nearby&&!t.done?' nearby':''}" style="${t.done?'opacity:.5':''}">
      <div class="mcheck${t.done?' done':''}" onclick="toggleDone(${t.id})" style="width:20px;height:20px"></div>
      <div style="flex:1;min-width:0"><div class="bl-text${t.done?' done':''}">${t.text}</div>${taskSub(t)}</div>
      <span class="cpill cat-${t.cat}">${catLabel(t.cat)}</span>
      <span class="mpill">${ML[t.moment]}</span>
      ${t.nearby&&!t.done?`<span class="dpill">${fmtDist(t.dist)}</span>`:''}
      ${t.inFocus?`<span class="fpill">Focus</span>`:`<button class="btn-focus" onclick="addToFocus(${t.id})" ${!canFocus()?'disabled':''}>+ Focus</button>`}
      <button class="btn-del" onclick="delTask(${t.id})">×</button>
    </div>`;
  });
  h+='</div>';
  document.getElementById('tab-backlog').innerHTML=h;
}
function renderMoments(){
  let h='';
  MOMENTS.forEach(m=>{
    const items=tasks.filter(t=>t.moment===m), done=items.filter(t=>t.done).length;
    h+=`<div class="moment-block"><div class="moment-head"><div class="mico" style="background:${MI[m].bg}">${MI[m].icon}</div><span class="mname">${ML[m]}</span><span class="mcnt">${done}/${items.length}</span></div><div>`;
    if(!items.length) h+=`<div class="empty-m">Aucune tâche</div>`;
    items.forEach(t=>{
      h+=`<div class="moment-item${t.nearby&&!t.done?' nearby':''}">
        <div class="mcheck${t.done?' done':''}" onclick="toggleDone(${t.id})"></div>
        <div style="flex:1;min-width:0"><div class="mi-text${t.done?' done':''}">${t.text}</div>${taskSub(t)}</div>
        <span class="cpill cat-${t.cat}">${catLabel(t.cat)}</span>
        ${t.nearby&&!t.done?`<span class="dpill">${fmtDist(t.dist)}</span>`:''}
        ${t.inFocus?`<span class="fpill">Focus</span>`:''}
      </div>`;
    });
    h+=`</div></div>`;
  });
  document.getElementById('tab-moments').innerHTML=h;
}
function render(){renderFocus();renderBacklog();renderMoments();}
loadData();
</script>
