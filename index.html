<title>Todo GPS</title>
<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F5F7;color:#1D1D1F;min-height:100vh}

.btn-map{border:1px solid #E5E5EA;border-radius:8px;padding:9px 12px;font-size:13px;color:#86868B;background:#fff;cursor:pointer;font-family:inherit;transition:all .15s;width:100%;text-align:left;display:flex;align-items:center;gap:8px}

.map-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:flex;align-items:flex-end;justify-content:center}

.map-sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:680px;overflow:hidden;display:flex;flex-direction:column;max-height:94vh;box-shadow:0 -8px 40px rgba(0,0,0,.15)}

.mi-text{font-size:14px;flex:1;min-width:0}

.edit-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;display:flex;align-items:flex-end;justify-content:center}

.edit-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:680px;padding:20px 16px 32px;box-shadow:0 -8px 40px rgba(0,0,0,.15)}

.edit-row input,.edit-row select{width:100%;border:1px solid #E5E5EA;border-radius:8px;padding:10px 12px;font-size:14px;background:#fff;font-family:inherit;outline:none}

.edit-loc-btn{width:100%;border:1px solid #E5E5EA;border-radius:8px;padding:10px 12px;font-size:13px;background:#fff;font-family:inherit;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;color:#86868B;transition:all .15s}

.btn-edit-icon:hover{opacity:1}
</style>

<body>

<div class="map-modal hidden" id="map-modal">
  <div class="map-sheet">
    <div class="map-header">
      <div>
        <div class="map-title">📍 Choisir un lieu</div>

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>

<div id="app">
  <div class="top-row">
    <div class="app-title">
      Mes tâches
      <span class="sync-badge loading" id="sync-badge">Connexion...</span>
    </div>

<script>
// ── Supabase config ───────────────────────────────────────────
const SUPA_URL='https://ihmrstjcccnjueygoqms.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlobXJzdGpjY2NuanVleWdvcW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDY2NDgsImV4cCI6MjA5NTk4MjY0OH0.ptvMGYlUJwiyG_-aeYpgtXt19OnNsOauNYQQowHaYbU';
const H={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'return=representation'};

async function dbFetch(path,opts={}){
  const res=await fetch(SUPA_URL+'/rest/v1/'+path,{headers:H,...opts});
  if(!res.ok) throw new Error(await res.text());
  return res.status===204?null:res.json();
}

// ── App state ─────────────────────────────────────────────────
const MAX=10, RADIUS=500, TILE=256;
const MOMENTS=['matin','apresmidi','soir'];
const ML={matin:'Matin',apresmidi:'Après-midi',soir:'Soir'};
const MI={matin:{bg:'#FEF3E2',icon:'🌅'},apresmidi:{bg:'#E8F0FF',icon:'☀️'},soir:{bg:'#EDEDF8',icon:'🌙'}};
let tasks=[], syncing=false;
let gpsActive=false, gpsWatcher=null, userPos=null, currentPlaceName=null;
let notifiedIds=new Set();
let newTaskCoords=null, newTaskLocName=null;

function setSyncBadge(state,txt){
  const el=document.getElementById('sync-badge');
  if(!el)return;
  el.textContent=txt;
  el.className='sync-badge'+(state==='ok'?'':state==='loading'?' loading':' error');
}
function setSave(t){const el=document.getElementById('save-txt');if(el)el.textContent=t;}

// ── Supabase CRUD ─────────────────────────────────────────────
function toRow(t){
  return{text:t.text,cat:t.cat,moment:t.moment,loc_name:t.locName||'',
    coords:t.coords?JSON.stringify(t.coords):null,
    in_focus:t.inFocus,done:t.done};
}
function fromRow(r){
  return{id:r.id,text:r.text,cat:r.cat||'autre',moment:r.moment||'matin',
    locName:r.loc_name||'',
    coords:r.coords?(typeof r.coords==='string'?JSON.parse(r.coords):r.coords):null,
    inFocus:r.in_focus,done:r.done,nearby:false,dist:null};
}

async function loadData(){
  setSyncBadge('loading','Chargement...');
  try{
    const rows=await dbFetch('tasks?order=id.asc');
    tasks=rows.map(fromRow);
    setSyncBadge('ok','✓ Synchronisé');
    render();
    subscribeRealtime();
  }catch(e){
    setSyncBadge('error','Erreur DB');
    console.error(e);
    // Fallback localStorage
    try{
      const raw=localStorage.getItem('todo_gps_v5')||localStorage.getItem('todo_gps_v4')||localStorage.getItem('todo_gps_v3');
      if(raw){const d=JSON.parse(raw);tasks=d.tasks||[];}
    }catch(e2){}
    render();
  }
}

async function addTaskDB(t){
  setSave('Sauvegarde...');
  try{
    const rows=await dbFetch('tasks',{method:'POST',body:JSON.stringify(toRow(t))});
    const newId=rows[0].id;
    // Remplacer l'id temporaire par l'id réel
    const idx=tasks.findIndex(x=>x.id===t.id);
    if(idx>=0) tasks[idx].id=newId;
    setSave('');
    render();
  }catch(e){setSyncBadge('error','Erreur sauvegarde');console.error(e);}
}

async function updateTaskDB(t){
  setSave('...');
  try{
    await dbFetch(`tasks?id=eq.${t.id}`,{method:'PATCH',body:JSON.stringify(toRow(t))});
    setSave('');
  }catch(e){setSyncBadge('error','Erreur mise à jour');console.error(e);}
}

async function deleteTaskDB(id){
  setSave('...');
  try{
    await dbFetch(`tasks?id=eq.${id}`,{method:'DELETE'});
    setSave('');
  }catch(e){setSyncBadge('error','Erreur suppression');console.error(e);}
}

// ── Realtime ──────────────────────────────────────────────────
function subscribeRealtime(){
  // Pas de polling — chargement unique au démarrage
  // Les modifications locales sont envoyées à Supabase en temps réel via addTaskDB/updateTaskDB/deleteTaskDB
}

// ── Carte canvas ──────────────────────────────────────────────
let mv={lat:25.2048,lon:55.2708,zoom:12};
let canvas,ctx,tileCache={},pickedCoords=null;
let drag=null,pinchDist0=null,isDragging=false;

function lon2x(lon,z){return(lon+180)/360*Math.pow(2,z);}
function lat2y(lat,z){return(1-Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2*Math.pow(2,z);}
function x2lon(x,z){return x/Math.pow(2,z)*360-180;}
function y2lat(y,z){return Math.atan(Math.sinh(Math.PI*(1-2*y/Math.pow(2,z))))*180/Math.PI;}
function ll2px(lat,lon){
  const cx=canvas.width/2,cy=canvas.height/2;
  return{x:cx+(lon2x(lon,mv.zoom)-lon2x(mv.lon,mv.zoom))*TILE,
         y:cy+(lat2y(lat,mv.zoom)-lat2y(mv.lat,mv.zoom))*TILE};
}
function px2ll(px,py){
  const cx=canvas.width/2,cy=canvas.height/2;
  return{lat:y2lat(lat2y(mv.lat,mv.zoom)+(py-cy)/TILE,mv.zoom),
         lon:x2lon(lon2x(mv.lon,mv.zoom)+(px-cx)/TILE,mv.zoom)};
}

function getTile(tx,ty,z){
  const key=`${z}/${tx}/${ty}`;
  if(tileCache[key]) return tileCache[key];
  const img=new Image(); img.crossOrigin='anonymous';
  const s=['a','b','c'][(tx+ty)%3];
  img.src=`https://${s}.tile.openstreetmap.org/${z}/${tx}/${ty}.png`;
  img.onload=()=>{tileCache[key]=img;drawMap();};
  img.onerror=()=>{
    const img2=new Image(); img2.crossOrigin='anonymous';
    img2.src=`https://a.basemaps.cartocdn.com/rastertiles/voyager_labels_under/${z}/${tx}/${ty}.png`;
    img2.onload=()=>{tileCache[key]=img2;drawMap();};
    img2.onerror=()=>{tileCache[key]='err';drawMap();};
  };
  tileCache[key]=null; return null;
}

function drawMap(){
  if(!canvas||!ctx) return;
  const W=canvas.width,H=canvas.height;
  const z=Math.round(Math.max(1,Math.min(19,mv.zoom)));
  const n=Math.pow(2,z);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#E8EAE8'; ctx.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2;
  const cxt=lon2x(mv.lon,z),cyt=lat2y(mv.lat,z);
  let pending=0;
  for(let tx=Math.floor(cxt-cx/TILE)-1;tx<=Math.floor(cxt+cx/TILE)+1;tx++){
    for(let ty=Math.floor(cyt-cy/TILE)-1;ty<=Math.floor(cyt+cy/TILE)+1;ty++){
      if(ty<0||ty>=n) continue;
      const px=Math.round(cx+(tx-cxt)*TILE), py=Math.round(cy+(ty-cyt)*TILE);
      const img=getTile((tx%n+n)%n,ty,z);
      if(img&&img!=='err'&&img.complete&&img.naturalWidth>0) ctx.drawImage(img,px,py,TILE,TILE);
      else{ctx.fillStyle='#DDE0DC';ctx.fillRect(px,py,TILE,TILE);if(!img)pending++;}
    }
  }
  const loadEl=document.getElementById('map-loading');
  if(loadEl) loadEl.style.display=pending>0?'block':'none';
  if(userPos){
    const p=ll2px(userPos.lat,userPos.lon);
    ctx.beginPath();ctx.arc(p.x,p.y,14,0,Math.PI*2);ctx.fillStyle='rgba(0,122,255,.15)';ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,7,0,Math.PI*2);ctx.fillStyle='#007AFF';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();
  }
  tasks.filter(t=>t.coords&&!t.done).forEach(t=>{
    const p=ll2px(t.coords.lat,t.coords.lon);
    if(p.x>-20&&p.x<W+20&&p.y>-40&&p.y<H+20){
      drawPin(p.x,p.y,t.nearby?'#30D158':'#FF9F0A');
      const label=t.text.substring(0,16)+(t.text.length>16?'…':'');
      const tw=ctx.measureText(label).width+16;
      ctx.fillStyle='rgba(0,0,0,.72)';
      ctx.beginPath();
      const lx=p.x-tw/2,ly=p.y-52;
      ctx.moveTo(lx+6,ly);ctx.lineTo(lx+tw-6,ly);ctx.quadraticCurveTo(lx+tw,ly,lx+tw,ly+6);
      ctx.lineTo(lx+tw,ly+14);ctx.quadraticCurveTo(lx+tw,ly+20,lx+tw-6,ly+20);
      ctx.lineTo(lx+6,ly+20);ctx.quadraticCurveTo(lx,ly+20,lx,ly+14);
      ctx.lineTo(lx,ly+6);ctx.quadraticCurveTo(lx,ly,lx+6,ly);ctx.closePath();ctx.fill();
      ctx.fillStyle='#fff';ctx.font='11px -apple-system,sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,p.x,p.y-42);
    }
  });
  if(pickedCoords){const p=ll2px(pickedCoords.lat,pickedCoords.lon);drawPin(p.x,p.y,'#007AFF');}
  ctx.fillStyle='rgba(255,255,255,.8)';ctx.fillRect(0,H-18,220,18);
  ctx.fillStyle='#666';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.fillText('© OpenStreetMap contributors',4,H-4);
  const zl=document.getElementById('map-zoom-label');
  if(zl) zl.textContent=`Zoom ${z}`;
}

function drawPin(x,y,color){
  ctx.beginPath();ctx.arc(x,y+2,10,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.15)';ctx.fill();
  ctx.beginPath();ctx.arc(x,y-14,10,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-5,y-8);ctx.lineTo(x,y+2);ctx.lineTo(x+5,y-8);
  ctx.fillStyle=color;ctx.fill();
  ctx.beginPath();ctx.arc(x,y-14,4,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.9)';ctx.fill();
}

function initMap(){
  canvas=document.getElementById('map-canvas');
  if(!canvas) return;
  ctx=canvas.getContext('2d');
  canvas.width=canvas.parentElement.clientWidth||360;
  canvas.height=Math.min(window.innerHeight*.48,340);
  tileCache={};
  canvas.addEventListener('click',e=>{
    if(isDragging) return;
    const r=canvas.getBoundingClientRect();
    const p=px2ll(e.clientX-r.left,e.clientY-r.top);
    setPicked(p.lat,p.lon);
  });
  canvas.addEventListener('mousedown',e=>{drag={x:e.clientX,y:e.clientY,lat:mv.lat,lon:mv.lon};isDragging=false;});
  canvas.addEventListener('mousemove',e=>{
    if(!drag) return;
    const dx=e.clientX-drag.x,dy=e.clientY-drag.y;
    if(Math.abs(dx)>4||Math.abs(dy)>4) isDragging=true;
    if(isDragging){mv.lat=y2lat(lat2y(drag.lat,mv.zoom)-dy/TILE,mv.zoom);mv.lon=x2lon(lon2x(drag.lon,mv.zoom)-dx/TILE,mv.zoom);drawMap();}
  });
  canvas.addEventListener('mouseup',()=>{drag=null;setTimeout(()=>isDragging=false,10);});
  canvas.addEventListener('mouseleave',()=>drag=null);
  canvas.addEventListener('touchstart',e=>{
    if(e.touches.length===1){isDragging=false;drag={x:e.touches[0].clientX,y:e.touches[0].clientY,lat:mv.lat,lon:mv.lon};}
    else if(e.touches.length===2) pinchDist0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&drag){
      const dx=e.touches[0].clientX-drag.x,dy=e.touches[0].clientY-drag.y;
      if(Math.abs(dx)>4||Math.abs(dy)>4) isDragging=true;
      if(isDragging){mv.lat=y2lat(lat2y(drag.lat,mv.zoom)-dy/TILE,mv.zoom);mv.lon=x2lon(lon2x(drag.lon,mv.zoom)-dx/TILE,mv.zoom);drawMap();}
    } else if(e.touches.length===2&&pinchDist0){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      if(Math.abs(d-pinchDist0)>8){mv.zoom=Math.max(2,Math.min(19,mv.zoom+(d>pinchDist0?.5:-.5)));pinchDist0=d;tileCache={};drawMap();}
    }
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    if(e.changedTouches.length===1&&!isDragging&&drag){
      const r=canvas.getBoundingClientRect();
      const p=px2ll(e.changedTouches[0].clientX-r.left,e.changedTouches[0].clientY-r.top);
      setPicked(p.lat,p.lon);
    }
    drag=null;pinchDist0=null;setTimeout(()=>isDragging=false,10);
  });
  canvas.addEventListener('wheel',e=>{e.preventDefault();mv.zoom=Math.max(2,Math.min(19,mv.zoom+(e.deltaY<0?.5:-.5)));tileCache={};drawMap();},{passive:false});
  drawMap();
}

function setPicked(lat,lon){
  pickedCoords={lat,lon};
  const el=document.getElementById('map-picked');
  el.textContent=`${lat.toFixed(5)}, ${lon.toFixed(5)}`;
  el.classList.remove('empty');
  document.getElementById('btn-confirm-map').disabled=false;
  drawMap();
}
function mapZoom(d){mv.zoom=Math.max(2,Math.min(19,mv.zoom+d));tileCache={};drawMap();}
function mapCenterGPS(){
  if(userPos){mv.lat=userPos.lat;mv.lon=userPos.lon;mv.zoom=16;tileCache={};drawMap();}
  else navigator.geolocation.getCurrentPosition(p=>{mv.lat=p.coords.latitude;mv.lon=p.coords.longitude;mv.zoom=16;tileCache={};drawMap();},()=>alert('GPS non disponible.'),{enableHighAccuracy:true,timeout:8000});
}
async function mapSearch(){
  const q=document.getElementById('map-search-inp').value.trim();
  if(!q) return;
  try{
    const res=await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q+' Dubai')}&limit=1&lang=fr`);
    const data=await res.json();
    if(data.features&&data.features[0]){
      const f=data.features[0];
      mv.lat=f.geometry.coordinates[1];mv.lon=f.geometry.coordinates[0];mv.zoom=16;
      tileCache={};setPicked(mv.lat,mv.lon);drawMap();
    } else alert('Lieu introuvable.');
  }catch(e){alert('Erreur réseau.');}
}
function useCurrentPos(){
  const go=(lat,lon)=>{mv.lat=lat;mv.lon=lon;mv.zoom=16;tileCache={};setPicked(lat,lon);drawMap();};
  if(userPos) go(userPos.lat,userPos.lon);
  else navigator.geolocation.getCurrentPosition(p=>go(p.coords.latitude,p.coords.longitude),()=>alert('GPS non disponible.'),{enableHighAccuracy:true,timeout:8000});
}
function openMap(){
  document.getElementById('map-modal').classList.remove('hidden');
  pickedCoords=null;
  document.getElementById('map-picked').textContent='Appuie sur la carte';
  document.getElementById('map-picked').classList.add('empty');
  document.getElementById('btn-confirm-map').disabled=true;
  document.getElementById('map-search-inp').value='';
  if(userPos){mv.lat=userPos.lat;mv.lon=userPos.lon;mv.zoom=15;}
  setTimeout(initMap,60);
}
function closeMap(){document.getElementById('map-modal').classList.add('hidden');}


// ── GPS ───────────────────────────────────────────────────────
function haversine(a,b,c,d){const R=6371000,dLat=(c-a)*Math.PI/180,dLon=(d-b)*Math.PI/180;const x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function fmtDist(d){if(d===null||d===undefined)return'';return d<1000?`${d}m`:`${(d/1000).toFixed(1)}km`;}

async function startGPS(){
  if(!navigator.geolocation){alert('Géolocalisation non supportée.');return;}
  setGPSUI('loading','Localisation en cours...');
  if('Notification' in window&&Notification.permission==='default') await Notification.requestPermission();
  notifiedIds=new Set();
  gpsWatcher=navigator.geolocation.watchPosition(
    pos=>{
      userPos={lat:pos.coords.latitude,lon:pos.coords.longitude};
      currentPlaceName=`${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
      setGPSUI('active',`GPS actif · précision ${Math.round(pos.coords.accuracy)}m`);
      checkProximity();
    },
    err=>{const m={1:'Accès refusé.',2:'Position indisponible.',3:'Délai dépassé.'};setGPSUI('error',m[err.code]||'Erreur GPS');gpsActive=false;render();},
    {enableHighAccuracy:true,maximumAge:10000,timeout:15000}
  );
  gpsActive=true;render();
}
function stopGPS(){
  if(gpsWatcher!==null) navigator.geolocation.clearWatch(gpsWatcher);
  gpsWatcher=null;gpsActive=false;userPos=null;currentPlaceName=null;
  tasks.forEach(t=>{t.nearby=false;t.dist=null;});
  setGPSUI('off','GPS désactivé');render();
}
function toggleGPS(){gpsActive?stopGPS():startGPS();}
function setGPSUI(s,msg){window._gpsState={state:s,msg};render();}

function checkProximity(){
  if(!userPos) return;
  let changed=false;
  tasks.filter(t=>t.coords&&!t.done).forEach(t=>{
    const d=Math.round(haversine(userPos.lat,userPos.lon,t.coords.lat,t.coords.lon));
    t.dist=d;const was=t.nearby;t.nearby=d<=RADIUS;
    if(t.nearby&&!was&&!notifiedIds.has(t.id)){
      notifiedIds.add(t.id);
      if('Notification' in window&&Notification.permission==='granted')
        new Notification('📍 Tâche à proximité !',{body:`"${t.text}" à ${fmtDist(d)} de toi.`});
    }
    if(!t.nearby) notifiedIds.delete(t.id);
    changed=true;
  });
  tasks.filter(t=>!t.coords||t.done).forEach(t=>{t.nearby=false;t.dist=null;});
  if(changed) render();
}

async function simulateNearby(){
  const t=tasks.find(x=>x.coords&&!x.done);
  if(!t){alert('Ajoute d\'abord une tâche avec un lieu épinglé.');return;}
  userPos={lat:t.coords.lat+0.001,lon:t.coords.lon};
  gpsActive=true;window._gpsState={state:'active',msg:'🧪 Mode test'};
  currentPlaceName='Position simulée';notifiedIds=new Set();
  checkProximity();
  if('Notification' in window){
    if(Notification.permission==='granted') new Notification('🧪 Test',{body:'Notifications OK ✅'});
    else{const p=await Notification.requestPermission();if(p==='granted') new Notification('🧪 Test',{body:'OK ✅'});}
  }
}

// ── Task ops ──────────────────────────────────────────────────
function catLabel(c){return{perso:'Perso',travail:'Travail',courses:'Courses',sante:'Santé',autre:'Autre'}[c]||c;}
function focusTasks(){return tasks.filter(t=>t.inFocus);}
function canFocus(){return focusTasks().length<3;}
function showTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['focus','backlog','moments'][i]===t));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));
  document.getElementById('tab-'+t).classList.add('visible');render();
}
function toggleDone(id){
  const t=tasks.find(x=>x.id===id);
  if(t){t.done=!t.done;if(t.done){t.nearby=false;t.dist=null;}updateTaskDB(t);render();}
}
function removeFromFocus(id){const t=tasks.find(x=>x.id===id);if(t){t.inFocus=false;updateTaskDB(t);render();}}
function addToFocus(id){if(!canFocus())return;const t=tasks.find(x=>x.id===id);if(t){t.inFocus=true;updateTaskDB(t);render();}}
function delTask(id){
  tasks=tasks.filter(x=>x.id!==id);
  deleteTaskDB(id);render();
}
function addTask(){
  if(tasks.length>=MAX) return;
  const inp=document.getElementById('new-task-inp');
  const txt=inp.value.trim();if(!txt) return;
  const t={id:Date.now(),text:txt,
    cat:document.getElementById('new-cat-sel').value,
    moment:document.getElementById('new-moment-sel').value,
    locName:newTaskLocName||'',coords:newTaskCoords||null,
    inFocus:false,done:false,nearby:false,dist:null};
  tasks.push(t);
  inp.value='';newTaskCoords=null;newTaskLocName=null;
  addTaskDB(t);render();
  if(userPos) checkProximity();
}

// ── Render ────────────────────────────────────────────────────
function gpsBarHTML(){
  const s=window._gpsState||{state:'off',msg:'GPS désactivé'};
  const nb=tasks.filter(t=>t.nearby&&!t.done).length;
  const dot=s.state==='active'?' active':s.state==='error'?' error':s.state==='loading'?' loading':'';
  const sub=userPos?`📍 ${currentPlaceName} · rayon ${RADIUS}m`:'Active le GPS pour détecter les tâches proches';
  return`<div class="gps-bar">
    <div class="gps-dot${dot}"></div>
    <div style="flex:1"><div class="gps-label">${s.msg}</div><div class="gps-sub">${sub}</div></div>
    ${nb>0?`<span class="nbadge">📍 ${nb}</span>`:''}
    <button class="btn-gps" onclick="simulateNearby()" style="background:#FEF3E2;border-color:#FAD67A;color:#7A4D0A;margin-right:4px" title="Tester">🧪</button>
    <button class="btn-gps${gpsActive?' active':''}" onclick="toggleGPS()">${gpsActive?'Arrêter':'GPS'}</button>
  </div>`;
}
function nearbyHTML(){
  const nb=tasks.filter(t=>t.nearby&&!t.done);
  if(!nb.length||!gpsActive) return'';
  return`<div class="nearby-alert"><span style="font-size:18px;flex-shrink:0">📍</span>
    <div><strong>${nb.length} tâche${nb.length>1?'s':''} à moins de ${RADIUS}m :</strong><br>
    ${nb.map(t=>`${t.text} <span class="dpill">${fmtDist(t.dist)}</span>`).join('<br>')}</div></div>`;
}
function taskSub(t){
  if(!t.coords) return'';
  let s=`<div class="bl-sub">📍 ${t.locName||'Lieu épinglé'}`;
  if(t.dist!==null&&gpsActive) s+=` · <span style="color:${t.nearby?'#1A5C2E':'#86868B'};font-weight:${t.nearby?600:400}">${fmtDist(t.dist)}</span>`;
  return s+'</div>';
}
function renderFocus(){
  const ft=focusTasks(),done=ft.filter(t=>t.done).length;
  let h=gpsBarHTML()+nearbyHTML();
  h+=`<div class="focus-header"><span class="focus-title">Mes 3 priorités du jour</span><span class="focus-sub">${done}/${ft.length} faites</span></div><div class="focus-slots">`;
  for(let i=0;i<3;i++){
    const t=ft[i];
    if(t){
      h+=`<div class="focus-slot filled${t.nearby&&!t.done?' nearby':''}${t.done?' done-s':''}">
        <div class="mcheck${t.done?' done':''}" onclick="toggleDone(${t.id})"></div>
        <div style="flex:1;min-width:0"><div class="stext${t.done?' done':''}">${t.text}</div>${taskSub(t)}</div>
        <span class="cpill cat-${t.cat}">${catLabel(t.cat)}</span>
        <span class="mpill">${ML[t.moment]}</span>
        ${t.nearby&&!t.done?`<span class="dpill">${fmtDist(t.dist)}</span>`:''}
        <button class="btn-del" onclick="removeFromFocus(${t.id})">×</button>
      </div>`;
    }else{
      h+=`<div class="focus-slot" onclick="showTab('backlog')"><span class="snum">${i+1}</span><span class="shint">Ajouter une priorité →</span></div>`;
    }
  }
  h+='</div>';
  const pending=tasks.filter(t=>!t.done&&!t.inFocus);
  if(pending.length){
    h+=`<div class="divider"></div><div class="sec-label">En attente (${pending.length})</div><div class="bl-list">`;
    [...pending].sort((a,b)=>b.nearby-a.nearby).slice(0,3).forEach(t=>{
      h+=`<div class="bl-item${t.nearby?' nearby':''}">
        <span class="bl-text">${t.text}</span>
        ${t.locName?`<span class="lpill">📍 ${t.locName}${t.dist!==null&&gpsActive?' · '+fmtDist(t.dist):''}</span>`:''}
        ${t.nearby?`<span class="dpill">Proche</span>`:''}
        <button class="btn-focus" onclick="addToFocus(${t.id})" ${!canFocus()?'disabled':''}>+ Focus</button>
      </div>`;
    });
    if(pending.length>3) h+=`<div style="font-size:12px;color:#86868B;padding:6px 2px">+${pending.length-3} autres dans Toutes</div>`;
    h+='</div>';
  }
  document.getElementById('tab-focus').innerHTML=h;
}
function renderBacklog(){
  const full=tasks.length>=MAX,warn=tasks.length>=MAX-2&&!full;
  const pc=full?'cnt-pill cnt-full':warn?'cnt-pill cnt-warn':'cnt-pill';
  let h=`<div class="count-row"><span class="sec-label">Toutes les tâches</span><span class="${pc}">${tasks.length}/${MAX}</span></div>`;
  if(full) h+=`<div class="limit-msg">⚠️ Limite atteinte — supprime une tâche pour en ajouter.</div>`;
  else{
    const locLabel=newTaskLocName?`📍 Lieu épinglé ✓`:'📍 Épingler sur la carte (optionnel)';
    h+=`<div class="add-box">
      <div class="add-row"><input type="text" id="new-task-inp" placeholder="Nouvelle tâche..." onkeydown="if(event.key==='Enter')addTask()"/></div>
      <div class="add-row"><button class="btn-map${newTaskLocName?' selected':''}" onclick="openMap()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
        ${locLabel}
      </button></div>
      <div class="add-row3">
        <select id="new-cat-sel"><option value="autre">Autre</option><option value="courses">Courses</option><option value="travail">Travail</option><option value="sante">Santé</option><option value="perso">Perso</option></select>
        <select id="new-moment-sel"><option value="matin">Matin</option><option value="apresmidi">Après-midi</option><option value="soir">Soir</option></select>
        <button class="btn-add" onclick="addTask()">Ajouter</button>
      </div>
    </div>`;
  }
  if(!tasks.length){h+=`<div style="text-align:center;padding:2.5rem;font-size:14px;color:#86868B">Aucune tâche</div>`;document.getElementById('tab-backlog').innerHTML=h;return;}
  h+=`<div class="bl-list">`;
  [...tasks].sort((a,b)=>{if(a.done!==b.done)return a.done-b.done;return b.nearby-a.nearby;}).forEach(t=>{
    h+=`<div class="bl-item${t.nearby&&!t.done?' nearby':''}" style="${t.done?'opacity:.5':''}">
      <div class="mcheck${t.done?' done':''}" onclick="toggleDone(${t.id})" style="width:20px;height:20px"></div>
      <div style="flex:1;min-width:0"><div class="bl-text${t.done?' done':''}">${t.text}</div>${taskSub(t)}</div>
      <span class="cpill cat-${t.cat}">${catLabel(t.cat)}</span>
      <span class="mpill">${ML[t.moment]}</span>
      ${t.nearby&&!t.done?`<span class="dpill">${fmtDist(t.dist)}</span>`:''}
      ${t.inFocus?`<span class="fpill">Focus</span>`:`<button class="btn-focus" onclick="addToFocus(${t.id})" ${!canFocus()?'disabled':''}>+ Focus</button>`}
      <button class="btn-edit-icon" onclick="openEdit(${t.id})" title="Modifier">✏️</button>
      <button class="btn-del" onclick="delTask(${t.id})">×</button>
    </div>`;
  });
  h+='</div>';
  document.getElementById('tab-backlog').innerHTML=h;
}
function renderMoments(){
  let h='';
  MOMENTS.forEach(m=>{
    const items=tasks.filter(t=>t.moment===m),done=items.filter(t=>t.done).length;
    h+=`<div class="moment-block"><div class="moment-head"><div class="mico" style="background:${MI[m].bg}">${MI[m].icon}</div><span class="mname">${ML[m]}</span><span class="mcnt">${done}/${items.length}</span></div><div>`;
    if(!items.length) h+=`<div class="empty-m">Aucune tâche</div>`;
    items.forEach(t=>{
      h+=`<div class="moment-item${t.nearby&&!t.done?' nearby':''}">
        <div class="mcheck${t.done?' done':''}" onclick="toggleDone(${t.id})"></div>
        <div style="flex:1;min-width:0"><div class="mi-text${t.done?' done':''}">${t.text}</div>${taskSub(t)}</div>
        <span class="cpill cat-${t.cat}">${catLabel(t.cat)}</span>
        ${t.nearby&&!t.done?`<span class="dpill">${fmtDist(t.dist)}</span>`:''}
        ${t.inFocus?`<span class="fpill">Focus</span>`:''}
      </div>`;
    });
    h+=`</div></div>`;
  });
  document.getElementById('tab-moments').innerHTML=h;
}

// ── Edition ───────────────────────────────────────────────────
let editingId=null, editCoords=null, editLocName=null;

function openEdit(id){
  const t=tasks.find(x=>x.id===id);
  if(!t) return;
  editingId=id;
  editCoords=t.coords?{...t.coords}:null;
  editLocName=t.locName||'';
  document.getElementById('edit-text').value=t.text;
  document.getElementById('edit-cat').value=t.cat||'autre';
  document.getElementById('edit-moment').value=t.moment||'matin';
  updateEditLocBtn();
  document.getElementById('edit-modal').classList.remove('hidden');
}

function updateEditLocBtn(){
  const locBtn=document.getElementById('edit-loc-btn');
  const locLabel=document.getElementById('edit-loc-label');
  if(!locBtn||!locLabel) return;
  if(editCoords){locBtn.classList.add('has-loc');locLabel.textContent='📍 '+editLocName;}
  else{locBtn.classList.remove('has-loc');locLabel.textContent='Ajouter un lieu sur la carte';}
}

function closeEdit(){
  document.getElementById('edit-modal').classList.add('hidden');
  editingId=null;editCoords=null;editLocName=null;
}

function openMapForEdit(){
  document.getElementById('edit-modal').classList.add('hidden');
  window._editMapMode=true;
  openMap();
}

function confirmMap(){
  if(window._editMapMode){
    window._editMapMode=false;
    if(pickedCoords){
      editCoords={lat:pickedCoords.lat,lon:pickedCoords.lon};
      editLocName=pickedCoords.lat.toFixed(4)+', '+pickedCoords.lon.toFixed(4);
    }
    closeMap();
    updateEditLocBtn();
    document.getElementById('edit-modal').classList.remove('hidden');
    return;
  }
  if(!pickedCoords) return;
  newTaskCoords={lat:pickedCoords.lat,lon:pickedCoords.lon};
  newTaskLocName=pickedCoords.lat.toFixed(4)+', '+pickedCoords.lon.toFixed(4);
  closeMap();render();
}

function updateEditLocBtn(){
  const locBtn=document.getElementById('edit-loc-btn');
  const locLabel=document.getElementById('edit-loc-label');
  if(!locBtn) return;
  if(editCoords){locBtn.classList.add('has-loc');locLabel.textContent='📍 '+editLocName;}
  else{locBtn.classList.remove('has-loc');locLabel.textContent='Ajouter un lieu sur la carte';}
}

async function saveEdit(){
  if(!editingId) return;
  const t=tasks.find(x=>x.id===editingId);
  if(!t) return;
  const txt=document.getElementById('edit-text').value.trim();
  if(!txt) return;
  t.text=txt;
  t.cat=document.getElementById('edit-cat').value;
  t.moment=document.getElementById('edit-moment').value;
  t.coords=editCoords;
  t.locName=editLocName||'';
  closeEdit();
  await updateTaskDB(t);
  render();
}

function render(){renderFocus();renderBacklog();renderMoments();}
loadData();
</script>
